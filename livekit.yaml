# LiveKit Server Configuration
# This file is generated for a single-node setup with integrated TURN.

port: 7880
bind: 0.0.0.0
log_level: info

rtc:
  tcp_port: 7881
  port_range_start: 50000
    port_range_end: 50100
  use_external_ip: true

turn:
  enabled: true
  domain: "${DOMAIN}"
  tls_port: 5349
  udp_port: 3478
  # set external_tls to true if using a L4 load balancer to terminate TLS
  external_tls: true

keys:
  "${LIVEKIT_API_KEY}": "${LIVEKIT_API_SECRET}"
