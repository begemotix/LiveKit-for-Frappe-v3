# Quelle für docker-compose.yml — wird von scripts/render-compose.sh aus Coolify-/.env-Werten erzeugt.
# Nur Platzhalter $VAR (Zahlen); keine Doppelpunkt-Strings in einer einzelnen Variable.

version: "3.9"

services:
  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command: --config /livekit.yaml
    ports:
      - "$LIVEKIT_HOST_PORT_SIGNALING:7880"
      - "$LIVEKIT_HOST_PORT_RTC_TCP:7881"
      - "$LIVEKIT_HOST_PORT_TURN_UDP:3478/udp"
      - "$LIVEKIT_HOST_PORT_TURN_TLS:5349/tcp"
      - "$LIVEKIT_HOST_UDP_START-$LIVEKIT_HOST_UDP_END:50000-60000/udp"
    volumes:
      - ./livekit.yaml:/livekit.yaml
    env_file:
      - .env

  caddy:
    profiles:
      - with-caddy
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "$CADDY_HOST_PORT_HTTP:80"
      - "$CADDY_HOST_PORT_HTTPS:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    env_file:
      - .env
    depends_on:
      - livekit

volumes:
  caddy_data:
  caddy_config:
