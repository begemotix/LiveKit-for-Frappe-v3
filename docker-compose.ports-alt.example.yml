# Beispiel: alternative Host-Ports für eine zweite LiveKit-Instanz auf demselben Server.
#
# CLI: docker compose -f docker-compose.yml -f docker-compose.ports-alt.example.yml up -d
#
# Diese Datei ersetzt die komplette ports-Liste von service "livekit" (Compose-Merge).
# Werte unten sind nur Muster — freie, unbelegte Host-Ports wählen.
#
# Coolify: falls nur eine Compose-Datei möglich ist, den folgenden Block unter
# services.livekit.ports in der UI einfügen und die Standard-ports dort ersetzen.

services:
  livekit:
    ports:
      - "17880:7880"
      - "17881:7881"
      - "13478:3478/udp"
      - "15349:5349/tcp"
      - "60001-70001:50000-60000/udp"
