# LiveKit Stack — Optimized for Performance (Host Networking)
# Recommendation: use network_mode: host for optimal WebRTC performance.
# No port mappings required in this mode; the container uses host ports directly.

version: "3.9"

services:
  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command:
      - --config-body
      - |
        port: 7880
        bind: 0.0.0.0
        log_level: info
        rtc:
          tcp_port: 7881
          port_range_start: 50000
          port_range_end: 50100
          use_external_ip: true
        turn:
          enabled: true
          domain: ${DOMAIN}
          tls_port: 5349
          udp_port: 3478
          external_tls: true
        keys:
          ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}
    network_mode: host
    env_file:
      - .env

  caddy:
    profiles:
      - with-caddy
    image: caddy:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    env_file:
      - .env

volumes:
  caddy_data:
  caddy_config:
