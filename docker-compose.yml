# LiveKit Stack — Unified Deployment (Host Networking)
# This includes the LiveKit Server, the Python Agent, and the Next.js Frontend.
# network_mode: host is used for optimal WebRTC and internal communication performance.

version: "3.9"

services:
  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command:
      - --config-body
      - |
        port: 7880
        log_level: info
        rtc:
          tcp_port: 7881
          port_range_start: 50000
          port_range_end: 50100
          use_external_ip: true
        turn:
          enabled: true
          domain: ${DOMAIN}
          tls_port: 5349
          udp_port: 3478
          external_tls: true
        keys:
          ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}
    ports:
      - "7880:7880"
      - "7881:7881"
      - "3478:3478/udp"
      - "5349:5349"
      - "50000-50100:50000-50100/udp"
    env_file:
      - .env
    networks:
      - livekit-net

  agent:
    build:
      context: ./apps/agent
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - LIVEKIT_URL=ws://livekit:7880
    depends_on:
      - livekit
    networks:
      - livekit-net

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL}
        NEXT_PUBLIC_APP_CONFIG_ENDPOINT: ${NEXT_PUBLIC_APP_CONFIG_ENDPOINT:-}
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - livekit
    networks:
      - livekit-net

  caddy:
    profiles:
      - with-caddy
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    env_file:
      - .env
    depends_on:
      - frontend
      - livekit
    networks:
      - livekit-net

networks:
  livekit-net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
