# LiveKit Stack — Unified Deployment (Host Networking)
# This includes the LiveKit Server, the Python Agent, and the Next.js Frontend.
# network_mode: host is used for optimal WebRTC and internal communication performance.

version: "3.9"

services:
  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command:
      - --config-body
      - |
        port: 7880
        log_level: info
        rtc:
          tcp_port: 7881
          port_range_start: 50000
          port_range_end: 50100
          use_external_ip: true
        turn:
          enabled: true
          domain: ${DOMAIN}
          tls_port: 5349
          udp_port: 3478
          external_tls: true
        keys:
          ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}
    network_mode: host
    env_file:
      - .env

  agent:
    build:
      context: ./apps/agent
      dockerfile: Dockerfile
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    depends_on:
      - livekit

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    depends_on:
      - livekit

  caddy:
    profiles:
      - with-caddy
    image: caddy:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    env_file:
      - .env
    depends_on:
      - frontend
      - livekit

volumes:
  caddy_data:
  caddy_config:
