# LiveKit Stack — Optimized for Performance (Host Networking)
# Recommendation: use network_mode: host for optimal WebRTC performance.
# No port mappings required in this mode; the container uses host ports directly.

version: "3.9"

services:
  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command: --config /livekit-server.yaml
    network_mode: host
    volumes:
      - ./livekit.config.yaml:/livekit-server.yaml
    env_file:
      - .env

  caddy:
    profiles:
      - with-caddy
    image: caddy:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    env_file:
      - .env

volumes:
  caddy_data:
  caddy_config:
