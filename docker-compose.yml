version: "3.9"

# Host-Ports sind per Env überschreibbar, damit mehrere Stacks auf einem Server
# parallel laufen (z. B. mehrere Coolify-Apps). Container-Ports bleiben unverändert
# und müssen zu livekit.yaml (rtc port_range, turn ports) passen.
services:
  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command: --config /livekit.yaml
    ports:
      - "${LIVEKIT_HOST_PORT_SIGNALING:-7880}:7880"
      - "${LIVEKIT_HOST_PORT_RTC_TCP:-7881}:7881"
      - "${LIVEKIT_HOST_PORT_TURN_UDP:-3478}:3478/udp"
      - "${LIVEKIT_HOST_PORT_TURN_TLS:-5349}:5349/tcp"
      - "${LIVEKIT_HOST_UDP_RANGE_START:-50000}-${LIVEKIT_HOST_UDP_RANGE_END:-60000}:50000-60000/udp"
    volumes:
      - ./livekit.yaml:/livekit.yaml
    env_file:
      - .env

  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "${CADDY_HOST_PORT_HTTP:-80}:80"
      - "${CADDY_HOST_PORT_HTTPS:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    env_file:
      - .env
    depends_on:
      - livekit

volumes:
  caddy_data:
  caddy_config:
